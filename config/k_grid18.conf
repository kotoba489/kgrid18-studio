# キーボード名の指定
CONFIG_ZMK_KEYBOARD_NAME="kgrid18-main"

# 左右分割の有効化（必須）
CONFIG_ZMK_SPLIT=y

# 接続の安定性を最大化（+8dB）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Bluetooth再接続安定化
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Windows/macOS のGATT通知まわりの再接続問題を回避
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Windows GATT Robust Caching問題を回避
CONFIG_BT_GATT_CACHING=n

# Bluetooth と USB の有効化
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# Bluetooth bond/profile を電源断後も保持する
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# バッテリーレベル報告の設定
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# ---------------------------------------------------------
CONFIG_ZMK_POINTING=y
# ---------------------------------------------------------
# 注意：ROLE_CENTRAL はシールド側の定義（left.overlay 等）で
# 自動制御されるため、ここではあいて明記せず ZMK の標準動作に任せます。
# これにより、左手は親、右手は子として正しく役割分担されます。
# ---------------------------------------------------------
# ZMK Studio 対応
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
